<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Serif', Georgia, serif;
    background: #f5f0e8;
    color: #2c2c2c;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 12px 16px;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    overflow-x: hidden;
  }

  /* ============ SPLASH ============ */
  #splash {
    position: fixed;
    inset: 0;
    z-index: 200;
    background: #f5f0e8;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: opacity 0.8s, visibility 0.8s;
    overflow: hidden;
  }
  #splash.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

  .floater {
    position: absolute;
    font-size: 1.2rem;
    opacity: 0.06;
    animation: floatUp linear infinite;
    pointer-events: none;
  }
  @keyframes floatUp {
    0%   { transform: translateY(110vh) rotate(0deg); }
    100% { transform: translateY(-20vh) rotate(720deg); }
  }

  /* Ink & Seal stamp */
  .splash-seal {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 52px;
    height: 52px;
    border: 2.5px solid #c0392b;
    border-radius: 4px;
    transform: rotate(-8deg);
    font-family: 'Noto Serif SC', serif;
    font-size: 1rem;
    font-weight: 700;
    color: #c0392b;
    line-height: 1.15;
    letter-spacing: 1px;
    text-align: center;
    margin-bottom: 14px;
    position: relative;
    z-index: 1;
    opacity: 0;
    animation: stampIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) 0.2s forwards;
  }
  @keyframes stampIn {
    0%   { opacity: 0; transform: rotate(-8deg) scale(1.4); }
    65%  { opacity: 1; transform: rotate(-8deg) scale(0.93); }
    100% { opacity: 1; transform: rotate(-8deg) scale(1); }
  }

  .splash-cn {
    font-family: 'Noto Serif', Georgia, serif;
    font-size: clamp(2rem, 10vw, 3.4rem);
    font-weight: 900;
    color: #2c2c2c;
    letter-spacing: 4px;
    text-transform: uppercase;
    opacity: 0;
    animation: brushInArena 1.1s ease-out 0.7s forwards;
    position: relative;
    z-index: 1;
  }
  @keyframes brushIn {
    0% { opacity: 0; transform: translateY(10px); letter-spacing: 20px; }
    100% { opacity: 1; transform: translateY(0); letter-spacing: 8px; }
  }
  @keyframes brushInArena {
    0%   { opacity: 0; transform: translateY(10px); letter-spacing: 14px; }
    100% { opacity: 1; transform: translateY(0);  letter-spacing: 4px; }
  }

  .splash-en {
    font-family: 'Noto Serif SC', serif;
    font-size: 0.95rem;
    color: #8b6914;
    letter-spacing: 8px;
    margin-top: 4px;
    opacity: 0;
    animation: fadeIn 0.8s ease-out 1.1s forwards;
    position: relative;
    z-index: 1;
  }
  @keyframes fadeIn {
    0% { opacity: 0; }
    100% { opacity: 1; }
  }

  .splash-line {
    width: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, #c0392b66, transparent);
    margin: 18px 0;
    opacity: 0;
    animation: fadeIn 0.6s ease-out 1.4s forwards;
    position: relative;
    z-index: 1;
  }

  .splash-play {
    padding: 12px 48px;
    border: 1.5px solid #2c2c2c;
    border-radius: 4px;
    font-family: 'Noto Serif', serif;
    font-size: 1rem;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: #2c2c2c;
    background: transparent;
    cursor: pointer;
    position: relative;
    z-index: 1;
    opacity: 0;
    animation: fadeIn 0.6s ease-out 1.6s forwards;
    transition: background 0.3s, color 0.3s;
  }
  .splash-play:hover { background: #2c2c2c; color: #f5f0e8; }

  /* ============ GAME ============ */
  #game {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    position: relative;
  }

  .game-header {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    margin-bottom: 6px;
    position: relative;
  }
  .game-title-cn {
    font-family: 'Noto Serif', Georgia, serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: #2c2c2c;
    letter-spacing: 4px;
    text-transform: uppercase;
  }
  .game-title-en {
    font-family: 'Noto Serif SC', serif;
    font-size: 0.65rem;
    color: #8b6914;
    letter-spacing: 5px;
    margin-top: 1px;
    text-align: center;
  }
  .game-title-wrap { text-align: center; }

  .btn-settings {
    position: absolute;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: 1.5px solid #c8bda8;
    border-radius: 50%;
    width: 34px;
    height: 34px;
    font-size: 1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #8b7355;
    transition: all 0.2s;
  }
  .btn-settings:hover { border-color: #2c2c2c; color: #2c2c2c; }

  .difficulty {
    display: flex;
    gap: 8px;
    margin-bottom: 6px;
  }
  .difficulty button {
    padding: 5px 14px;
    border: 1.5px solid #c8bda8;
    border-radius: 4px;
    background: transparent;
    color: #8b7355;
    font-family: 'Noto Serif', serif;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .difficulty button.active {
    border-color: #2c2c2c;
    color: #2c2c2c;
    background: #2c2c2c0a;
  }
  .difficulty button:hover { border-color: #2c2c2c; }

  .scoreboard {
    display: flex;
    gap: 20px;
    margin-bottom: 4px;
    font-size: 0.75rem;
  }
  .scoreboard span { opacity: 0.7; }
  .score-wins { color: #2c2c2c; }
  .score-losses { color: #c23b22; }
  .score-draws { color: #8b6914; }

  .status {
    font-size: 0.9rem;
    margin-bottom: 6px;
    min-height: 1.3em;
    transition: color 0.3s;
    color: #555;
  }
  .status.win { color: #2c2c2c; font-weight: 700; }
  .status.lose { color: #c23b22; }
  .status.draw { color: #8b6914; }

  /* ============ BOARD ============ */
  .board {
    display: grid;
    grid-template-columns: repeat(19, 1fr);
    grid-template-rows: repeat(19, 1fr);
    width: min(400px, 94vw);
    aspect-ratio: 1;
    flex-shrink: 0;
    margin-bottom: 10px;
    background: #d4a456;
    border-radius: 4px;
    box-shadow: 0 2px 16px #00000018, inset 0 1px 0 #e8c47a, inset 0 -1px 0 #b8883a;
    padding: 8px;
    position: relative;
  }
  .cell {
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    position: relative;
    background: transparent;
    transition: background 0.1s;
  }
  .cell:hover:not(.disabled) { background: #00000010; border-radius: 50%; }
  .cell.disabled { cursor: default; pointer-events: none; }
  /* Grid lines drawn through intersection centers */
  .cell::before {
    content: '';
    position: absolute;
    left: 0; right: 0;
    top: calc(50% - 0.5px);
    height: 1px;
    background: #1a1a1a55;
    pointer-events: none;
    z-index: 0;
  }
  .cell::after {
    content: '';
    position: absolute;
    top: 0; bottom: 0;
    left: calc(50% - 0.5px);
    width: 1px;
    background: #1a1a1a55;
    pointer-events: none;
    z-index: 0;
  }
  /* Clip lines at board edges */
  .cell.edge-left::before  { left: 50%; }
  .cell.edge-right::before { right: 50%; }
  .cell.edge-top::after    { top: 50%; }
  .cell.edge-bottom::after { bottom: 50%; }
  /* Star points (hoshi) */
  .star-point {
    position: absolute;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #1a1a1a99;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 1;
  }

  /* Stones */
  .stone {
    width: 82%;
    height: 82%;
    border-radius: 50%;
    animation: stonePlace 0.3s cubic-bezier(0.22, 1, 0.36, 1);
    position: relative;
    z-index: 2;
  }
  @keyframes stonePlace {
    0% { transform: translateY(-8px) scale(0.7); opacity: 0; }
    60% { transform: translateY(1px) scale(1.02); opacity: 1; }
    100% { transform: translateY(0) scale(1); opacity: 1; }
  }
  @keyframes stoneRestore {
    0%   { transform: scale(0.3); opacity: 0; }
    100% { transform: scale(1);   opacity: 1; }
  }
  .stone.black {
    background: radial-gradient(circle at 35% 30%, #555, #1a1a1a 60%, #000);
    box-shadow: 1px 2px 4px #00000044;
  }
  .stone.white {
    background: radial-gradient(circle at 35% 30%, #fff, #ece8e0 50%, #d8d4cc);
    border: 1px solid #00000022;
    box-shadow: 1px 2px 4px #00000022;
  }

  .cell.win-cell {
    background: #8b691422;
  }
  .cell.win-cell .stone { box-shadow: 0 0 10px #8b691466, 1px 2px 4px #00000033; }

  /* Buttons */
  .actions {
    display: flex;
    gap: 10px;
  }
  .actions button {
    padding: 8px 20px;
    border: 1.5px solid #c8bda8;
    border-radius: 4px;
    font-family: 'Noto Serif', serif;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
    background: transparent;
    color: #555;
  }
  .actions button:active { transform: scale(0.97); }
  .btn-new { background: #2c2c2c; color: #f5f0e8; border-color: #2c2c2c; }
  .btn-new:hover { background: #444; }
  .btn-stats:hover { border-color: #2c2c2c; color: #2c2c2c; }
  .btn-undo:not(:disabled):hover { border-color: #8b6914; color: #8b6914; }
  .btn-undo:disabled { opacity: 0.3; cursor: default; pointer-events: none; }
  .btn-hint:not(:disabled):hover { border-color: #c8a96e; color: #8b6914; }
  .btn-hint:disabled { opacity: 0.3; cursor: default; pointer-events: none; }
  @keyframes hintGhostPulse {
    0%, 100% { opacity: 0.45; transform: scale(1); }
    50%       { opacity: 0.15; transform: scale(0.88); }
  }
  .hint-ghost {
    animation: hintGhostPulse 0.8s ease-in-out infinite !important;
    pointer-events: none;
  }
  .difficulty-start-btn {
    padding: 5px 14px;
    border: 1.5px solid #c8bda8;
    border-radius: 4px;
    background: transparent;
    color: #8b7355;
    font-family: 'Noto Serif', serif;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .difficulty-start-btn.active { border-color: #2c2c2c; color: #2c2c2c; background: #2c2c2c0a; }
  .difficulty-start-btn:hover { border-color: #2c2c2c; }

  /* ============ MODALS ============ */
  #confirmOverlay { z-index: 110; }
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.3);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #f5f0e8;
    border-radius: 8px;
    padding: 24px;
    width: min(380px, 94vw);
    max-height: 80dvh;
    overflow-y: auto;
    position: relative;
    color: #2c2c2c;
    box-shadow: 0 8px 40px #00000022;
    border: 1px solid #d4c9b8;
  }
  .modal h2 {
    font-family: 'Noto Serif SC', serif;
    font-size: 1.1rem;
    margin-bottom: 16px;
    text-align: center;
    color: #2c2c2c;
  }
  .modal-close {
    position: absolute;
    top: 10px;
    right: 12px;
    background: none;
    border: none;
    color: #999;
    font-size: 1.3rem;
    cursor: pointer;
    line-height: 1;
  }
  .modal-close:hover { color: #2c2c2c; }

  /* Stats table */
  .stats-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 4px;
  }
  .stats-table th {
    font-size: 0.7rem;
    font-weight: 700;
    color: #8b6914;
    text-align: center;
    padding: 0 2px 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .stats-table th:first-child { text-align: left; visibility: hidden; }
  .stats-table td {
    text-align: center;
    padding: 8px 2px;
    border-top: 1px solid #e0d8cc;
    font-size: 0.82rem;
    font-weight: 600;
    color: #2c2c2c;
  }
  .stats-table td:first-child {
    text-align: left;
    color: #8b7355;
    font-weight: 400;
    font-size: 0.78rem;
  }
  .stats-table .col-total { color: #8b6914; }
  .stats-actions {
    display: flex;
    gap: 10px;
    margin-top: 16px;
    justify-content: center;
  }
  .stats-actions button {
    padding: 7px 18px;
    border-radius: 4px;
    font-family: 'Noto Serif', serif;
    font-size: 0.8rem;
    cursor: pointer;
    border: 1.5px solid #c8bda8;
    background: transparent;
    color: #555;
  }
  .btn-stats-reset { border-color: #c23b2244; color: #c23b22; }
  .btn-stats-reset:hover { background: #c23b2211; }
  .btn-stats-close { background: #2c2c2c; color: #f5f0e8; border-color: #2c2c2c; }

  /* Confirm modal */
  .confirm-msg { font-size: 0.85rem; color: #8b7355; margin: 0 0 20px; line-height: 1.5; text-align: center; }
  .confirm-actions { display: flex; gap: 10px; justify-content: center; }
  .btn-confirm-cancel {
    padding: 9px 20px; border: 1.5px solid #c8bda8; border-radius: 4px;
    background: transparent; color: #555;
    font-family: 'Noto Serif', serif; font-size: 0.85rem; cursor: pointer;
  }
  .btn-confirm-cancel:hover { border-color: #2c2c2c; color: #2c2c2c; }
  .btn-confirm-ok {
    padding: 9px 20px; border: none; border-radius: 4px;
    color: #f5f0e8; font-family: 'Noto Serif', serif; font-size: 0.85rem; cursor: pointer;
  }

  /* Settings */
  .setting-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 0;
    border-bottom: 1px solid #e0d8cc;
  }
  .setting-row:last-child { border-bottom: none; }
  .setting-label { font-size: 0.9rem; }
  .toggle {
    position: relative;
    width: 46px;
    height: 26px;
    cursor: pointer;
  }
  .toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
  .toggle-track {
    position: absolute;
    inset: 0;
    background: #ccc;
    border-radius: 13px;
    transition: background 0.25s;
  }
  .toggle input:checked + .toggle-track { background: #8b6914; }
  .toggle-thumb {
    position: absolute;
    top: 3px;
    left: 3px;
    width: 20px;
    height: 20px;
    background: #fff;
    border-radius: 50%;
    transition: transform 0.25s;
    box-shadow: 0 1px 3px #00000022;
  }
  .toggle input:checked ~ .toggle-thumb { transform: translateX(20px); }

  .settings-close-wrap { text-align: center; margin-top: 16px; }
  .btn-settings-close {
    padding: 7px 24px;
    border: none;
    border-radius: 4px;
    background: #2c2c2c;
    color: #f5f0e8;
    font-family: 'Noto Serif', serif;
    font-size: 0.85rem;
    cursor: pointer;
  }

  /* ============ ENDGAME ============ */
  .endgame-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.3);
    z-index: 90;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .endgame-overlay.open { display: flex; }
  .endgame {
    background: #f5f0e8;
    border-radius: 8px;
    padding: 28px 32px;
    width: min(280px, 82vw);
    text-align: center;
    animation: popIn 0.3s ease-out;
    color: #2c2c2c;
    box-shadow: 0 8px 40px #00000022;
    border: 1px solid #d4c9b8;
  }
  @keyframes popIn {
    0% { transform: scale(0.8); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
  .endgame-icon { font-size: 2.5rem; margin-bottom: 8px; }
  .endgame-result {
    font-family: 'Noto Serif SC', serif;
    font-size: 1.3rem;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .endgame-result.win { color: #2c2c2c; }
  .endgame-result.lose { color: #c23b22; }
  .endgame-result.draw { color: #8b6914; }
  .endgame-sub { font-size: 0.8rem; color: #8b7355; margin-bottom: 22px; }
  .endgame-actions { display: flex; gap: 10px; justify-content: center; }
  .btn-play-now {
    padding: 9px 24px;
    border: none;
    border-radius: 4px;
    background: #2c2c2c;
    color: #f5f0e8;
    font-family: 'Noto Serif', serif;
    font-size: 0.85rem;
    cursor: pointer;
  }
  .btn-change-diff {
    padding: 9px 14px;
    border: 1.5px solid #c8bda8;
    border-radius: 4px;
    background: transparent;
    color: #8b7355;
    font-family: 'Noto Serif', serif;
    font-size: 0.8rem;
    cursor: pointer;
  }
  .btn-change-diff:hover { border-color: #2c2c2c; color: #2c2c2c; }
</style>

<body>

<!-- ====== SPLASH ====== -->
<div id="splash">
  <div class="splash-seal">棋<br>场</div>
  <div class="splash-cn">Gomoku Arena</div>
  <div class="splash-en">五子棋</div>
  <div class="splash-line"></div>
  <button class="splash-play" id="splashPlay">Play</button>
</div>

<!-- ====== GAME ====== -->
<div id="game">
  <div class="game-header">
    <div class="game-title-wrap">
      <div class="game-title-cn">Gomoku Arena</div>
      <div class="game-title-en">五子棋</div>
    </div>
    <button class="btn-settings" id="openSettings" title="Settings">&#9881;&#65039;</button>
  </div>

  <div class="difficulty">
    <button data-diff="easy" class="active">Easy</button>
    <button data-diff="medium">Medium</button>
    <button data-diff="hard">Hard</button>
  </div>

  <div class="scoreboard">
    <span class="score-wins">Wins: <span id="wins">0</span></span>
    <span class="score-losses">Losses: <span id="losses">0</span></span>
  </div>

  <div class="status" id="status">Place your stone</div>

  <div class="board" id="board"></div>

<script>
// ====== AUDIO — ZEN ======
let audioCtx = null;
let musicGain = null;
let musicInterval = null;

const AUDIO_KEY = 'ttt_audio_prefs';
let audioPrefs = { music: true, sfx: true };
try { const s = JSON.parse(localStorage.getItem(AUDIO_KEY)); if (s) audioPrefs = s; } catch {}
document.getElementById('toggleMusic').checked = audioPrefs.music;
document.getElementById('toggleSfx').checked = audioPrefs.sfx;
function saveAudioPrefs() { localStorage.setItem(AUDIO_KEY, JSON.stringify(audioPrefs)); }

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  musicGain = audioCtx.createGain();
  musicGain.gain.value = 0.05;
  musicGain.connect(audioCtx.destination);
}

// Pentatonic melody — C D E G A (Chinese pentatonic, lower octave)
const MELODY = [
  [262, 0.4, 0.3], [294, 0.3, 0.2], [330, 0.5, 0.4],
  [392, 0.3, 0.3], [440, 0.5, 0.5],
  [392, 0.4, 0.3], [330, 0.3, 0.4], [262, 0.6, 0.6],
  [294, 0.4, 0.3], [330, 0.3, 0.2], [392, 0.5, 0.4],
  [440, 0.4, 0.3], [392, 0.6, 0.8],
];

function playMusic() {
  if (!audioCtx || !audioPrefs.music) return;
  stopMusic();
  let noteIdx = 0;
  function playNext() {
    if (!audioPrefs.music) { stopMusic(); return; }
    const [freq, dur, pause] = MELODY[noteIdx % MELODY.length];
    const osc = audioCtx.createOscillator();
    const env = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    env.gain.setValueAtTime(0, audioCtx.currentTime);
    env.gain.linearRampToValueAtTime(0.1, audioCtx.currentTime + 0.05);
    env.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    osc.connect(env);
    env.connect(musicGain);
    osc.start();
    osc.stop(audioCtx.currentTime + dur + 0.05);
    noteIdx++;
    musicInterval = setTimeout(playNext, (dur + pause) * 1000);
  }
  playNext();
}

function stopMusic() {
  if (musicInterval) { clearTimeout(musicInterval); musicInterval = null; }
}

function playSound(type) {
  if (!audioCtx || !audioPrefs.sfx) return;
  const t = audioCtx.currentTime;

  if (type === 'stone') {
    // Crisp tock — stone on wood
    const bufSize = audioCtx.sampleRate * 0.06;
    const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufSize, 8);
    const src = audioCtx.createBufferSource();
    src.buffer = buf;
    const bp = audioCtx.createBiquadFilter();
    bp.type = 'bandpass';
    bp.frequency.value = 2200;
    bp.Q.value = 2;
    const gain = audioCtx.createGain();
    gain.gain.value = 0.35;
    src.connect(bp);
    bp.connect(gain);
    gain.connect(audioCtx.destination);
    src.start(t);
  }
  else if (type === 'win') {
    // Ascending pentatonic arpeggio
    [262, 330, 392, 440, 523].forEach((f, i) => {
      const osc = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.value = f;
      g.gain.setValueAtTime(0, t + i * 0.12);
      g.gain.linearRampToValueAtTime(0.15, t + i * 0.12 + 0.03);
      g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.12 + 0.35);
      osc.connect(g);
      g.connect(audioCtx.destination);
      osc.start(t + i * 0.12);
      osc.stop(t + i * 0.12 + 0.4);
    });
  }
  else if (type === 'lose') {
    // Descending gentle
    [440, 392, 330, 262].forEach((f, i) => {
      const osc = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.value = f;
      g.gain.setValueAtTime(0, t + i * 0.15);
      g.gain.linearRampToValueAtTime(0.1, t + i * 0.15 + 0.03);
      g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.15 + 0.35);
      osc.connect(g);
      g.connect(audioCtx.destination);
      osc.start(t + i * 0.15);
      osc.stop(t + i * 0.15 + 0.4);
    });
  }
  else if (type === 'draw') {
    // Singing bowl resonance
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.value = 528;
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.12, t + 0.05);
    g.gain.exponentialRampToValueAtTime(0.001, t + 1.5);
    osc.connect(g);
    g.connect(audioCtx.destination);
    osc.start(t);
    osc.stop(t + 1.6);
  }
}

// ====== SPLASH ======
const splash = document.getElementById('splash');
['⚫','⚪','⚫','⚪','⚫','⚪','⚫','⚪'].forEach(ch => {
  const el = document.createElement('div');
  el.className = 'floater';
  el.textContent = ch;
  el.style.left = (Math.random() * 90 + 5) + '%';
  el.style.animationDuration = (10 + Math.random() * 10) + 's';
  el.style.animationDelay = (Math.random() * 8) + 's';
  el.style.fontSize = (0.8 + Math.random() * 1) + 'rem';
  splash.appendChild(el);
});

document.getElementById('splashPlay').addEventListener('click', () => {
  splash.classList.add('hidden');
  initAudio();
  if (audioPrefs.music) playMusic();
  newGame();
});

// ====== GAME ======
const GRID = 19;
const TOTAL = GRID * GRID;
const WIN_LEN = 5;
const HUMAN = 'X';
const BOT = 'O';
let humanIsBlack = true;
// Alternate colors per difficulty; persisted across reloads
const NEXT_BLACK_KEY = 'gomoku_next_black';
function loadNextBlack() {
  try { const s = JSON.parse(localStorage.getItem(NEXT_BLACK_KEY)); if (s && typeof s === 'object') return s; } catch {}
  return { easy: true, medium: true, hard: true };
}
function saveNextBlack() { localStorage.setItem(NEXT_BLACK_KEY, JSON.stringify(nextIsBlack)); }
const nextIsBlack = loadNextBlack();
const DIRS = [[0,1],[1,0],[1,1],[1,-1]];

let board = Array(TOTAL).fill(null);
let gameOver = false;
let difficulty = 'easy';
let scores = { wins: 0, losses: 0, draws: 0 };

const STATS_KEY = 'ttt_lifetime_stats';
function defaultStats() { return { easy:{w:0,l:0,d:0,mw:0}, medium:{w:0,l:0,d:0,mw:0}, hard:{w:0,l:0,d:0,mw:0} }; }
function loadLifetime() {
  try {
    const saved = JSON.parse(localStorage.getItem(STATS_KEY)) || defaultStats();
    for (const d of ['easy','medium','hard']) { if (saved[d].mw === undefined) saved[d].mw = 0; }
    return saved;
  } catch { return defaultStats(); }
}
function saveLifetime() { localStorage.setItem(STATS_KEY, JSON.stringify(lifetime)); }
let lifetime = loadLifetime();

// ====== GAME STATE PERSISTENCE ======
const GAME_STATE_KEY = 'gomoku_active_game';

function saveActiveGame() {
  localStorage.setItem(GAME_STATE_KEY, JSON.stringify({
    board: board.slice(), difficulty, humanIsBlack,
    moveHistory: moveHistory.slice(), undosRemaining, hintsRemaining,
  }));
}
function clearActiveGame() { localStorage.removeItem(GAME_STATE_KEY); }

function restoreActiveGame() {
  try {
    const saved = JSON.parse(localStorage.getItem(GAME_STATE_KEY));
    if (!saved || !Array.isArray(saved.board) || saved.board.length !== TOTAL) { clearActiveGame(); return false; }
    difficulty     = saved.difficulty || 'easy';
    humanIsBlack   = !!saved.humanIsBlack;
    board          = saved.board;
    moveHistory    = saved.moveHistory || [];
    undosRemaining = saved.undosRemaining !== undefined ? saved.undosRemaining : MAX_UNDOS;
    hintsRemaining = saved.hintsRemaining !== undefined ? saved.hintsRemaining : HINT_LIMITS[difficulty];
    gameOver = false;

    // Sync difficulty buttons
    document.querySelectorAll('.difficulty button').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.diff === difficulty);
    });

    // Hide splash, freeze board during replay
    splash.classList.add('hidden');
    disableBoard();
    updateScoreboard();
    statusEl.textContent = 'Resuming your game…';
    statusEl.className = 'status';

    // Replay each move with progressive deceleration (quadratic easing)
    const MIN_STEP = 40;   // ms between stones at start of replay
    const MAX_STEP = 450;  // ms between stones at end of replay
    const n = moveHistory.length;
    let cumDelay = 200;    // brief pause so "Resuming…" is readable before first stone

    moveHistory.forEach((cellIdx, moveIdx) => {
      setTimeout(() => {
        const player = ((moveIdx % 2 === 0) === humanIsBlack) ? HUMAN : BOT;
        const cell = boardEl.children[cellIdx];
        const s = document.createElement('div');
        s.className = 'stone ' + (player === HUMAN
          ? (humanIsBlack ? 'black' : 'white')
          : (humanIsBlack ? 'white' : 'black'));
        s.style.animation = 'stoneRestore 0.1s ease-out';
        cell.appendChild(s);
        cell.classList.add(player === HUMAN ? 'black-cell' : 'white-cell');
      }, cumDelay);
      // t goes 0→1; squaring it makes the slowdown accelerate toward the end
      const t = (moveIdx + 1) / Math.max(n, 1);
      cumDelay += MIN_STEP + (MAX_STEP - MIN_STEP) * (t * t);
    });

    // After replay completes: enable board, greet player
    setTimeout(() => {
      updateUndoButton();
      updateHintButton();
      enableBoard();
      statusEl.textContent = 'Welcome back — ' + (humanIsBlack ? '⚫' : '⚪') + ' your move';
      setTimeout(() => {
        if (!gameOver) statusEl.textContent = (humanIsBlack ? '⚫' : '⚪') + ' — your move';
      }, 2500);
    }, cumDelay + 400);

    return true;
  } catch { clearActiveGame(); return false; }
}

const boardEl = document.getElementById('board');
const statusEl = document.getElementById('status');
const winsEl = document.getElementById('wins');
const lossesEl = document.getElementById('losses');

// Star point positions for a 19×19 board (0-indexed)
const STAR_POINTS = new Set([
  3*19+3,  3*19+9,  3*19+15,
  9*19+3,  9*19+9,  9*19+15,
  15*19+3, 15*19+9, 15*19+15
]);

for (let i = 0; i < TOTAL; i++) {
  const [r, c] = rc(i);
  const classes = ['cell'];
  if (r === 0)        classes.push('edge-top');
  if (r === GRID - 1) classes.push('edge-bottom');
  if (c === 0)        classes.push('edge-left');
  if (c === GRID - 1) classes.push('edge-right');
  const cell = document.createElement('div');
  cell.className = classes.join(' ');
  cell.dataset.index = i;
  cell.addEventListener('click', () => handleClick(i));
  if (STAR_POINTS.has(i)) {
    const star = document.createElement('div');
    star.className = 'star-point';
    cell.appendChild(star);
  }
  boardEl.appendChild(cell);
}

function rc(idx) { return [Math.floor(idx / GRID), idx % GRID]; }
function idx(r, c) { return r * GRID + c; }
function inBounds(r, c) { return r >= 0 && r < GRID && c >= 0 && c < GRID; }

function findWin(pos, player) {
  const [r0, c0] = rc(pos);
  for (const [dr, dc] of DIRS) {
    const cells = [pos];
    for (let k = 1; k < WIN_LEN; k++) {
      const nr = r0 + dr*k, nc = c0 + dc*k;
      if (inBounds(nr, nc) && board[idx(nr, nc)] === player) cells.push(idx(nr, nc));
      else break;
    }
    for (let k = 1; k < WIN_LEN; k++) {
      const nr = r0 - dr*k, nc = c0 - dc*k;
      if (inBounds(nr, nc) && board[idx(nr, nc)] === player) cells.push(idx(nr, nc));
      else break;
    }
    if (cells.length >= WIN_LEN) return cells;
  }
  return null;
}

// ====== CONFIRM MODAL ======
let pendingConfirmAction = null;
const confirmOverlay = document.getElementById('confirmOverlay');

function showConfirm(title, message, okLabel, onConfirm, danger = false) {
  document.getElementById('confirmTitle').textContent = title;
  document.getElementById('confirmMessage').textContent = message;
  const okBtn = document.getElementById('confirmOk');
  okBtn.textContent = okLabel;
  okBtn.style.background = danger ? '#c23b22' : '#2c2c2c';
  pendingConfirmAction = onConfirm;
  confirmOverlay.classList.add('open');
}
document.getElementById('confirmOk').addEventListener('click', () => {
  confirmOverlay.classList.remove('open');
  if (pendingConfirmAction) { pendingConfirmAction(); pendingConfirmAction = null; }
});
document.getElementById('confirmCancel').addEventListener('click', () => {
  confirmOverlay.classList.remove('open');
  pendingConfirmAction = null;
});
confirmOverlay.addEventListener('click', e => {
  if (e.target === confirmOverlay) { confirmOverlay.classList.remove('open'); pendingConfirmAction = null; }
});

function recordForfeit() {
  scores.losses++;
  lifetime[difficulty].l++;
  saveLifetime();
  clearActiveGame();
  updateScoreboard();
}

document.querySelectorAll('.difficulty button').forEach(btn => {
  btn.addEventListener('click', () => {
    if (btn.classList.contains('active')) return;
    const applyChange = () => {
      document.querySelector('.difficulty .active').classList.remove('active');
      btn.classList.add('active');
      difficulty = btn.dataset.diff;
      hintsRemaining = HINT_LIMITS[difficulty];
      newGame();
    };
    const gameInProgress = !gameOver && board.some(v => v !== null);
    if (gameInProgress) {
      showConfirm('Forfeit Game?', 'This counts as a loss. Switch to ' + btn.dataset.diff + '?', 'Forfeit', () => { recordForfeit(); applyChange(); }, true);
    } else {
      applyChange();
    }
  });
});

document.getElementById('newGame').addEventListener('click', () => {
  const gameInProgress = !gameOver && board.some(v => v !== null);
  if (gameInProgress) {
    showConfirm('Forfeit Game?', 'This counts as a loss. Start a new game?', 'Forfeit', () => { recordForfeit(); newGame(); }, true);
  } else {
    newGame();
  }
});

let lastMove = -1;
let moveHistory = [];
const MAX_UNDOS = 1;
let undosRemaining = MAX_UNDOS;

const HINT_LIMITS = { easy: 2, medium: 1, hard: 0 };
let hintsRemaining = 2;
let awaitingPlayerMove = false;
let hintTimeout = null;

function handleClick(i) {
  if (board[i] || gameOver) return;
  makeMove(i, HUMAN);
  if (gameOver) return;
  saveActiveGame();
  disableBoard();
  statusEl.textContent = 'Opponent is thinking\u2026';
  const delay = 1000 + Math.random() * 2000;
  setTimeout(() => {
    botMove();
    if (!gameOver) { saveActiveGame(); enableBoard(); }
    if (undosRemaining > 0) updateUndoButton();
  }, delay);
}

function makeMove(i, player) {
  clearHintHighlight();
  board[i] = player;
  lastMove = i;
  moveHistory.push(i);
  const cell = boardEl.children[i];
  const stone = document.createElement('div');
  const isBlack = (player === HUMAN) === humanIsBlack;
  stone.className = 'stone ' + (isBlack ? 'black' : 'white');
  cell.appendChild(stone);
  cell.classList.add(player === HUMAN ? 'black-cell' : 'white-cell');
  playSound('stone');
  checkEnd(i, player);
}

function checkEnd(pos, player) {
  const winCells = findWin(pos, player);
  if (winCells) {
    gameOver = true;
    winCells.forEach(i => boardEl.children[i].classList.add('win-cell'));
    if (player === HUMAN) {
      statusEl.textContent = 'Victory!';
      statusEl.className = 'status win';
      const humanMoveCount = humanIsBlack ? Math.ceil(moveHistory.length / 2) : Math.floor(moveHistory.length / 2);
      scores.wins++; lifetime[difficulty].w++; lifetime[difficulty].mw += humanMoveCount;
      trackEvent('game_completed', { difficulty, outcome: 'win', move_count: humanMoveCount });
    } else {
      statusEl.textContent = 'Defeat';
      statusEl.className = 'status lose';
      scores.losses++; lifetime[difficulty].l++;
      const humanMoveCount = humanIsBlack ? Math.ceil(moveHistory.length / 2) : Math.floor(moveHistory.length / 2);
      trackEvent('game_completed', { difficulty, outcome: 'loss', move_count: humanMoveCount });
    }
    saveLifetime(); clearActiveGame(); updateScoreboard(); disableBoard();
    setTimeout(() => showEndgame(player === HUMAN ? 'win' : 'lose'), 600);
    return;
  }
  if (!board.includes(null)) {
    gameOver = true;
    statusEl.textContent = 'Draw';
    statusEl.className = 'status draw';
    scores.draws++; lifetime[difficulty].d++;
    trackEvent('game_completed', { difficulty, outcome: 'draw', move_count: moveHistory.length });
    saveLifetime(); clearActiveGame(); updateScoreboard(); disableBoard();
    setTimeout(() => showEndgame('draw'), 600);
  }
}

// ====== HEURISTIC AI ======
function scoreLine(r, c, dr, dc, player) {
  let count = 0, openEnds = 0;
  let fr = r+dr, fc = c+dc;
  while (inBounds(fr, fc) && board[idx(fr, fc)] === player) { count++; fr += dr; fc += dc; }
  if (inBounds(fr, fc) && board[idx(fr, fc)] === null) openEnds++;
  let br = r-dr, bc = c-dc;
  while (inBounds(br, bc) && board[idx(br, bc)] === player) { count++; br -= dr; bc -= dc; }
  if (inBounds(br, bc) && board[idx(br, bc)] === null) openEnds++;
  if (count >= WIN_LEN-1) return 100000;
  if (count === WIN_LEN-2 && openEnds === 2) return 10000;
  if (count === WIN_LEN-2 && openEnds === 1) return 1000;
  if (count === WIN_LEN-3 && openEnds === 2) return 1000;
  if (count === WIN_LEN-3 && openEnds === 1) return 100;
  if (count === WIN_LEN-4 && openEnds === 2) return 100;
  if (count === WIN_LEN-4 && openEnds === 1) return 10;
  return count > 0 ? count : 0;
}

function evalCell(i) {
  if (board[i] !== null) return -1;
  const [r, c] = rc(i);
  let bs = 0, hs = 0;
  for (const [dr, dc] of DIRS) { bs += scoreLine(r,c,dr,dc,BOT); hs += scoreLine(r,c,dr,dc,HUMAN); }
  return bs * 1.1 + hs + Math.max(0, 18 - Math.abs(r-9) - Math.abs(c-9));
}

function getTopMoves(n) {
  const cands = new Set();
  for (let i = 0; i < TOTAL; i++) {
    if (board[i] === null) continue;
    const [r, c] = rc(i);
    for (let dr = -2; dr <= 2; dr++) for (let dc = -2; dc <= 2; dc++) {
      const nr = r+dr, nc = c+dc;
      if (inBounds(nr, nc) && board[idx(nr, nc)] === null) cands.add(idx(nr, nc));
    }
  }
  if (cands.size === 0) return [idx(7,7)];
  const scored = [];
  for (const i of cands) scored.push({i, s: evalCell(i)});
  scored.sort((a,b) => b.s - a.s);
  return scored.slice(0, n).map(x => x.i);
}

function pickWeighted(moves, weights) {
  const r = Math.random(); let cum = 0;
  for (let j = 0; j < moves.length && j < weights.length; j++) {
    cum += weights[j];
    if (r < cum) return moves[j];
  }
  return moves[0];
}

// Per-difficulty weights for move ranks #1–#10
const DIFF_WEIGHTS = {
  easy:   [0.25, 0.20, 0.10, 0.10, 0.10, 0.05, 0.05, 0.05, 0.05, 0.05],
  medium: [0.50, 0.25, 0.10, 0.05, 0.05, 0.01, 0.01, 0.01, 0.01, 0.01],
  hard:   [0.70, 0.20, 0.03, 0.01, 0.01, 0.01, 0.01, 0.01, 0.01, 0.01],
};

// Returns all empty cells where placing `player` would win immediately
function findImmediateWins(player) {
  const wins = [];
  for (let i = 0; i < TOTAL; i++) {
    if (board[i] !== null) continue;
    board[i] = player;
    if (findWin(i, player)) wins.push(i);
    board[i] = null;
  }
  return wins;
}

function botMove() {
  if (gameOver) return;
  let move;

  // Forced: take an immediate win
  const botWins = findImmediateWins(BOT);
  if (botWins.length > 0) {
    move = botWins[0];
  } else {
    // Forced: block any human win — never skip this regardless of difficulty
    const humanWins = findImmediateWins(HUMAN);
    if (humanWins.length > 0) {
      // If multiple threats, pick the one scored highest (also best counter-attack)
      humanWins.sort((a, b) => evalCell(b) - evalCell(a));
      move = humanWins[0];
    } else {
      // No forced move — use difficulty weights across top 10 candidates
      move = pickWeighted(getTopMoves(10), DIFF_WEIGHTS[difficulty]);
    }
  }

  makeMove(move, BOT);
  if (!gameOver) { statusEl.textContent = humanIsBlack ? '⚫ — your move' : '⚪ — your move'; statusEl.className = 'status'; }
}

function disableBoard() { boardEl.querySelectorAll('.cell').forEach(c => c.classList.add('disabled')); awaitingPlayerMove = false; updateHintButton(); }
function enableBoard()  { boardEl.querySelectorAll('.cell').forEach(c => c.classList.remove('disabled')); awaitingPlayerMove = true; updateHintButton(); }
function updateScoreboard() { winsEl.textContent=scores.wins; lossesEl.textContent=scores.losses; }

// ====== UNDO ======
const undoBtn = document.getElementById('undoBtn');

function updateUndoButton() {
  undoBtn.textContent = `↩ Undo (${undosRemaining})`;
  undoBtn.disabled = undosRemaining === 0;
}

const hintBtn = document.getElementById('hintBtn');

function updateHintButton() {
  const limit = HINT_LIMITS[difficulty];
  if (limit === 0) {
    hintBtn.textContent = 'Hint —';
    hintBtn.disabled = true;
    return;
  }
  hintBtn.textContent = `Hint (${hintsRemaining})`;
  hintBtn.disabled = !awaitingPlayerMove || hintsRemaining === 0;
}

function clearHintHighlight() {
  if (hintTimeout) { clearTimeout(hintTimeout); hintTimeout = null; }
  boardEl.querySelectorAll('.hint-ghost').forEach(g => g.remove());
}

function getHintMove() {
  // 1. Can human win immediately? Play there.
  const humanWins = findImmediateWins(HUMAN);
  if (humanWins.length > 0) return humanWins[0];
  // 2. Bot is about to win? Block it.
  const botWins = findImmediateWins(BOT);
  if (botWins.length > 0) return botWins[0];
  // 3. Best strategic move by heuristic
  return getTopMoves(1)[0];
}

function showHint() {
  if (!awaitingPlayerMove || hintsRemaining === 0 || gameOver) return;
  const move = getHintMove();
  if (move === undefined) return;
  clearHintHighlight();
  // Inject a semi-transparent ghost stone so the suggestion is unambiguous
  const isBlack = humanIsBlack;
  const ghost = document.createElement('div');
  ghost.className = 'stone ' + (isBlack ? 'black' : 'white') + ' hint-ghost';
  boardEl.children[move].appendChild(ghost);
  hintsRemaining--;
  updateHintButton();
  trackEvent('hint_used', { difficulty, hints_remaining: hintsRemaining });
  hintTimeout = setTimeout(clearHintHighlight, 3000);
}

function handleUndo() {
  if (undosRemaining === 0 || moveHistory.length < 2) return;
  const botIdx   = moveHistory.pop();
  const humanIdx = moveHistory.pop();
  board[botIdx]   = null;
  board[humanIdx] = null;
  [botIdx, humanIdx].forEach(i => {
    const stone = boardEl.children[i].querySelector('.stone');
    if (stone) stone.remove();
    boardEl.children[i].classList.remove('black-cell', 'white-cell', 'win-cell');
  });
  undosRemaining--;
  updateUndoButton();
  trackEvent('undo_used', { difficulty, undos_remaining: undosRemaining });
  if (gameOver) { gameOver = false; closeEndgame(); }
  statusEl.textContent = 'Stone taken back — choose wisely';
  statusEl.className = 'status';
  enableBoard();
}
undoBtn.addEventListener('click', handleUndo);
hintBtn.addEventListener('click', showHint);

// ====== ANALYTICS HELPERS ======
function trackEvent(name, params) {
  if (typeof gtag === 'function') gtag('event', name, params);
}

function newGame() {
  board = Array(TOTAL).fill(null);
  gameOver = false; lastMove = -1;
  moveHistory = []; undosRemaining = MAX_UNDOS;
  updateUndoButton();
  undoBtn.disabled = true;
  clearHintHighlight();
  hintsRemaining = HINT_LIMITS[difficulty];
  awaitingPlayerMove = false;
  updateHintButton();
  boardEl.querySelectorAll('.cell').forEach(c => {
    c.classList.remove('disabled', 'black-cell', 'white-cell', 'win-cell');
    const stone = c.querySelector('.stone');
    if (stone) stone.remove();
  });

  // Set color for this game (flip happens only when Begin is confirmed)
  humanIsBlack = nextIsBlack[difficulty];
  disableBoard();
  statusEl.textContent = '';
  statusEl.className = 'status';

  // Show start prompt
  document.querySelectorAll('.difficulty-start-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.diff === difficulty);
  });
  const startOverlay = document.getElementById('startOverlay');
  document.getElementById('startIcon').textContent = humanIsBlack ? '⚫' : '⚪';
  document.getElementById('startColor').textContent = humanIsBlack ? 'You are Black' : 'You are White';
  document.getElementById('startSub').textContent = humanIsBlack ? 'First stone is yours' : 'Opponent opens';
  startOverlay.classList.add('open');
}

// ====== ENDGAME ======
const endgameOverlay = document.getElementById('endgameOverlay');
const endgameIcon = document.getElementById('endgameIcon');
const endgameResult = document.getElementById('endgameResult');
const endgameSub = document.getElementById('endgameSub');

function showEndgame(result) {
  if (result === 'win') {
    endgameIcon.textContent = '\u26AB'; endgameResult.textContent = 'Victory!';
    endgameResult.className = 'endgame-result win'; playSound('win');
  } else if (result === 'lose') {
    endgameIcon.textContent = '\u26AA'; endgameResult.textContent = 'Defeat';
    endgameResult.className = 'endgame-result lose'; playSound('lose');
  } else {
    endgameIcon.textContent = '\u262F'; endgameResult.textContent = 'Draw';
    endgameResult.className = 'endgame-result draw'; playSound('draw');
  }
  endgameSub.textContent = `${difficulty.charAt(0).toUpperCase()+difficulty.slice(1)}`;

  endgameOverlay.classList.add('open');
}

function closeEndgame() { endgameOverlay.classList.remove('open'); }

document.getElementById('playNow').addEventListener('click', () => { closeEndgame(); newGame(); });
document.getElementById('changeDiff').addEventListener('click', () => { closeEndgame(); });
document.getElementById('endgameStats').addEventListener('click', () => { closeEndgame(); openStats(); });

// Enter button — commit this game's color and flip for next time
document.getElementById('startBegin').addEventListener('click', () => {
  nextIsBlack[difficulty] = !nextIsBlack[difficulty]; // flip for next game
  saveNextBlack();
  document.getElementById('startOverlay').classList.remove('open');
  trackEvent('game_started', { difficulty, color: humanIsBlack ? 'black' : 'white' });
  if (humanIsBlack) {
    enableBoard();
    statusEl.textContent = '⚫ — your move';
  } else {
    statusEl.textContent = 'Opponent is thinking…';
    setTimeout(() => { botMove(); enableBoard(); statusEl.textContent = '⚪ — your move'; }, 800);
  }
});

// Close button — dismiss prompt without starting; color is not consumed
document.getElementById('startClose').addEventListener('click', () => {
  document.getElementById('startOverlay').classList.remove('open');
  statusEl.textContent = 'Change difficulty or press New Game';
  statusEl.className = 'status';
});

// Difficulty buttons inside the start overlay
document.querySelectorAll('.difficulty-start-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.difficulty-start-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    // Keep main difficulty row in sync
    document.querySelectorAll('.difficulty button').forEach(b => {
      b.classList.toggle('active', b.dataset.diff === btn.dataset.diff);
    });
    difficulty = btn.dataset.diff;
    humanIsBlack = nextIsBlack[difficulty];
    document.getElementById('startIcon').textContent = humanIsBlack ? '⚫' : '⚪';
    document.getElementById('startColor').textContent = humanIsBlack ? 'You are Black' : 'You are White';
    document.getElementById('startSub').textContent = humanIsBlack ? 'First stone is yours' : 'Opponent opens';
  });
});

// ====== SETTINGS ======
const settingsOverlay = document.getElementById('settingsOverlay');
document.getElementById('openSettings').addEventListener('click', () => settingsOverlay.classList.add('open'));
document.getElementById('settingsClose').addEventListener('click', () => settingsOverlay.classList.remove('open'));
document.getElementById('settingsCloseBtn').addEventListener('click', () => settingsOverlay.classList.remove('open'));
settingsOverlay.addEventListener('click', e => { if (e.target === settingsOverlay) settingsOverlay.classList.remove('open'); });
document.getElementById('toggleMusic').addEventListener('change', function() { audioPrefs.music=this.checked; saveAudioPrefs(); if(audioPrefs.music)playMusic(); else stopMusic(); });
document.getElementById('toggleSfx').addEventListener('change', function() { audioPrefs.sfx=this.checked; saveAudioPrefs(); });

// ====== STATS ======
const modalOverlay = document.getElementById('modalOverlay');
const statsContent = document.getElementById('statsContent');

function pct(w, total) { return total === 0 ? '—' : Math.round(w / total * 100) + '%'; }
function avgMoves(s) { return s.w === 0 ? '—' : (s.mw / s.w).toFixed(1); }

function openStats() {
  const diffs = ['easy', 'medium', 'hard'];
  const tot = { w:0, l:0, d:0, mw:0 };
  for (const d of diffs) { tot.w+=lifetime[d].w; tot.l+=lifetime[d].l; tot.d+=lifetime[d].d; tot.mw+=lifetime[d].mw; }

  const rows = [
    ['Games Played', d => lifetime[d].w+lifetime[d].l+lifetime[d].d, () => tot.w+tot.l+tot.d],
    ['Wins',         d => lifetime[d].w,  () => tot.w],
    ['Losses',       d => lifetime[d].l,  () => tot.l],
    ['Win %',        d => pct(lifetime[d].w, lifetime[d].w+lifetime[d].l+lifetime[d].d), () => pct(tot.w, tot.w+tot.l+tot.d)],
    ['Avg Moves to Win', d => avgMoves(lifetime[d]), () => avgMoves(tot)],
  ];

  statsContent.innerHTML = `
    <table class="stats-table">
      <thead><tr>
        <th>—</th><th>Easy</th><th>Med</th><th>Hard</th><th class="col-total">All</th>
      </tr></thead>
      <tbody>${rows.map(([label, valFn, totFn]) => `
        <tr>
          <td>${label}</td>
          ${diffs.map(d => `<td>${valFn(d)}</td>`).join('')}
          <td class="col-total">${totFn()}</td>
        </tr>`).join('')}
      </tbody>
    </table>`;

  modalOverlay.classList.add('open');
}
function closeStats() { modalOverlay.classList.remove('open'); }
document.getElementById('openStats').addEventListener('click', openStats);
document.getElementById('modalClose').addEventListener('click', closeStats);
document.getElementById('statsClose').addEventListener('click', closeStats);
modalOverlay.addEventListener('click', e => { if (e.target === modalOverlay) closeStats(); });
document.getElementById('statsReset').addEventListener('click', () => {
  showConfirm('Reset Stats?', 'All lifetime stats will be permanently deleted.', 'Reset', () => {
    lifetime = defaultStats(); saveLifetime(); openStats();
  }, true);
});

restoreActiveGame();
</script>
